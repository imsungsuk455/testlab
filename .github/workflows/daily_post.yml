name: Daily Auto Post

on:
  schedule:
    # 매일 UTC 15:00 = 한국 시간(KST) 자정 00:00 에 실행
    - cron: '0 15 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  auto-posting:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow google-genai python-dotenv
          
      - name: Install Korean Fonts for Thumbnail
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum

      - name: Run Auto Post Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python auto_post.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto Post: Daily Blog Article & Thumbnail Added" || echo "No changes to commit"
          git push
